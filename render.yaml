services:
  # Telegram Bot — runs 24/7 as a background worker
  - type: worker
    name: ytdown-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: node bot.js
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false  # Set manually in Render dashboard (secret)

